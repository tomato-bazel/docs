name: docs

# Build the docs.tbzl.dev site (Astro + Pagefind full-text search) and publish to
# GitHub Pages. The Modules reference (src/data/modules.json) is regenerated from
# the live registry each build — so newly-published modules appear without a code
# change (also nightly). Replaces the previous mdBook build.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "astro.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "tools/**"
      - ".github/workflows/docs.yml"
  schedule:
    - cron: "17 7 * * *"   # nightly — pick up newly-published registry modules
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: regenerate the module reference from the registry + repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth 1 https://github.com/tomato-bazel/bazel-registry .registry
          python3 tools/gen_modules.py --registry .registry \
            --out src/data/modules.json --content src/content/moduledocs --fetch
          rm -rf .registry

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build   # astro build && pagefind --site dist

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
